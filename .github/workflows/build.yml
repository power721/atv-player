name: Build Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libmpv-dev libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Linux AppImage tool
        if: matrix.platform == 'linux'
        run: |
          curl -fsSL -o "$RUNNER_TEMP/appimagetool-x86_64.AppImage" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "$RUNNER_TEMP/appimagetool-x86_64.AppImage"
          echo "APPIMAGE_TOOL=$RUNNER_TEMP/appimagetool-x86_64.AppImage" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Install macOS system dependencies
        if: matrix.platform == 'macos'
        run: brew install mpv

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path "mpv" | Out-Null
          Invoke-WebRequest -Uri "http://46.38.157.230/libmpv-2.dll" -OutFile "mpv\libmpv-2.dll"
          $mpvDll = Get-Item "mpv\libmpv-2.dll"
          if ($mpvDll.Length -le 0) {
            throw "Downloaded libmpv-2.dll is empty"
          }
          Write-Host "Downloaded libmpv runtime: $($mpvDll.FullName) ($([Math]::Round($mpvDll.Length / 1MB, 2)) MB)"

      - name: Sync dependencies
        run: uv sync --frozen --group dev --group package

      - name: Build application
        run: uv run python build.py ${{ matrix.platform }}

      - name: Resolve artifact version (POSIX)
        if: matrix.platform != 'windows'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ARTIFACT_VERSION="${GITHUB_REF_NAME#v}"
          else
            ARTIFACT_VERSION=dev
          fi
          echo "ARTIFACT_VERSION=$ARTIFACT_VERSION" >> "$GITHUB_ENV"

      - name: Resolve artifact version (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $artifactVersion = $env:GITHUB_REF_NAME.Substring(1)
          } else {
            $artifactVersion = 'dev'
          }
          "ARTIFACT_VERSION=$artifactVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve artifact paths (POSIX)
        if: matrix.platform != 'windows'
        run: |
          ARCHIVE_NAME=$(uv run python -c "import build, os; print(build.build_archive_name('${{ matrix.platform }}', version=os.environ['ARTIFACT_VERSION']))")
          BUNDLE_PATH=$(uv run python -c "import build; print(build.bundle_path_for_target('${{ matrix.platform }}'))")
          RELEASE_ASSET_PATH=$(uv run python -c "import build, os; print(build.release_artifact_path_for_target('${{ matrix.platform }}', version=os.environ['ARTIFACT_VERSION']))")
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> "$GITHUB_ENV"
          echo "RELEASE_ASSET_PATH=$RELEASE_ASSET_PATH" >> "$GITHUB_ENV"

      - name: Resolve archive name (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $archiveName = uv run python -c "import build, os; print(build.build_archive_name('${{ matrix.platform }}', version=os.environ['ARTIFACT_VERSION']))"
          $bundlePath = uv run python -c "import build; print(build.bundle_path_for_target('${{ matrix.platform }}'))"
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUNDLE_PATH=$bundlePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Archive Linux bundle
        if: matrix.platform == 'linux'
        run: |
          test -f "$RELEASE_ASSET_PATH"

      - name: Archive macOS bundle
        if: matrix.platform == 'macos'
        run: |
          test -d "$BUNDLE_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE_PATH" "dist/$ARCHIVE_NAME"

      - name: Archive Windows bundle
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (!(Test-Path $env:BUNDLE_PATH)) {
            throw "Missing bundle path: $env:BUNDLE_PATH"
          }
          Copy-Item $env:BUNDLE_PATH "dist\$env:ARCHIVE_NAME" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-bundle
          path: dist/${{ env.ARCHIVE_NAME }}
          retention-days: 7

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.AppImage" -o -name "*.zip" -o -name "*.exe" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
